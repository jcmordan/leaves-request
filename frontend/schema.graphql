type Query {
  me: User!
  myRequests: [LeaveRequest!]!
  allRequests(status: RequestStatus): [LeaveRequest!]!
  pendingApprovals: [LeaveRequest!]!
}

type Mutation {
  createRequest(input: CreateRequestInput!): LeaveRequest!
  updateRequestStatus(id: ID!, status: RequestStatus!, comments: String): LeaveRequest!
}

type User {
  id: ID!
  name: String!
  email: String!
  role: String!
}

enum RequestStatus {
  PENDING
  APPROVED
  REJECTED
  CANCELLED
}

type LeaveRequest {
  id: ID!
  employee: User!
  absenceType: String!
  category: String!
  startDate: String!
  endDate: String!
  duration: Int!
  reason: String!
  status: RequestStatus!
  submittedAt: String!
  hospitalName: String
  doctorName: String
}

input CreateRequestInput {
  absenceType: String!
  category: String!
  startDate: String! # ISO Date string
  endDate: String!
  reason: String!
  hospitalName: String
  doctorName: String
}
